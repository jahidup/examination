<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100">
  <div id="admin-login-screen" class="min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
      <h2 class="text-2xl font-bold mb-6 text-center">Admin Login</h2>
      <form id="admin-login-form">
        <div class="mb-4">
          <label class="block text-gray-700 mb-2">Username</label>
          <input type="text" id="admin-username" required class="w-full px-4 py-2 border rounded-lg">
        </div>
        <div class="mb-6">
          <label class="block text-gray-700 mb-2">Password</label>
          <input type="password" id="admin-password" required class="w-full px-4 py-2 border rounded-lg">
        </div>
        <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700">Login</button>
        <p id="admin-login-error" class="text-red-500 mt-2 text-center"></p>
      </form>
      <p class="mt-4 text-center text-gray-600">
        <a href="index.html" class="text-indigo-500 hover:underline">Student Login</a>
      </p>
    </div>
  </div>

  <div id="admin-panel" class="hidden">
    <!-- Admin panel content populated by admin.js -->
  </div>

  <script src="admin.js"></script>
</body>
</html>
