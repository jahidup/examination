<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Portal - Student</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50">
  <div id="app">
    <!-- Login Screen -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center">
      <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md backdrop-blur-sm bg-white/80">
        <h2 class="text-2xl font-bold mb-6 text-center">Student Login</h2>
        <form id="login-form">
          <div class="mb-4">
            <label class="block text-gray-700 mb-2">Student ID</label>
            <input type="text" id="studentId" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div class="mb-6">
            <label class="block text-gray-700 mb-2">Date of Birth</label>
            <input type="date" id="dob" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">Login</button>
          <p id="login-error" class="text-red-500 mt-2 text-center"></p>
        </form>
        <p class="mt-4 text-center text-gray-600">
          <a href="admin.html" class="text-blue-500 hover:underline">Admin Login</a>
        </p>
      </div>
    </div>

    <!-- Dashboard Screen (hidden initially) -->
    <div id="dashboard-screen" class="hidden">
      <!-- Will be populated by dashboard.js -->
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast" class="fixed bottom-5 right-5 z-50 hidden"></div>

  <script src="dashboard.js"></script>
</body>
</html>
